name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-22.04
    container:
      image: quay.io/pypa/manylinux_2_28_x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Install dependencies
        run: |
          uv python install 3.10
          uv sync
          uv pip install pyinstaller

      - name: Download tiktoken data for offline use
        run: uv run python scripts/download_tiktoken_data.py

      - name: Install UPX
        run: |
          UPX_VERSION="4.2.4"
          curl -sL "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-amd64_linux.tar.xz" -o /tmp/upx.tar.xz
          tar -xf /tmp/upx.tar.xz -C /tmp
          cp "/tmp/upx-${UPX_VERSION}-amd64_linux/upx" /usr/local/bin/
          rm -rf /tmp/upx*

      - name: Build with PyInstaller
        run: |
          export SEPILOT_SOURCE_DIR="$(pwd)/sepilot"
          uv run pyinstaller sepilot_protected.spec --clean --noconfirm
        shell: bash

      - name: Rename artifacts
        run: |
          mv dist/sepilot dist/sepilot-linux-amd64
          mv dist/sepilot-lsp dist/sepilot-lsp-linux-amd64
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sepilot-linux-amd64
          path: |
            dist/sepilot-linux-amd64
            dist/sepilot-lsp-linux-amd64

  build-linux-legacy:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build in manylinux2014 container
        run: |
          docker run --rm -v "${{ github.workspace }}:/work" -w /work \
            quay.io/pypa/manylinux2014_x86_64 \
            bash -c '
              set -e
              curl -LsSf https://astral.sh/uv/install.sh | sh
              export PATH="$HOME/.local/bin:$PATH"

              # Install Rust (needed to build tiktoken from source on manylinux2014)
              curl --proto "=https" --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
              export PATH="$HOME/.cargo/bin:$PATH"

              uv python install 3.10
              # Several packages lack manylinux2014 wheels — exclude them.
              # They are optional at runtime (RAG, benchmarks) and guarded by try/except.
              uv sync \
                --no-install-package onnxruntime \
                --no-install-package pyarrow \
                --no-install-package datasets \
                --no-install-package swebench \
                --no-install-package chromadb
              uv pip install pyinstaller

              # Use --no-sync to prevent uv run from re-triggering dependency resolution
              uv run --no-sync python scripts/download_tiktoken_data.py

              UPX_VERSION="4.2.4"
              curl -sL "https://github.com/upx/upx/releases/download/v${UPX_VERSION}/upx-${UPX_VERSION}-amd64_linux.tar.xz" -o /tmp/upx.tar.xz
              tar -xf /tmp/upx.tar.xz -C /tmp
              cp "/tmp/upx-${UPX_VERSION}-amd64_linux/upx" /usr/local/bin/
              rm -rf /tmp/upx*

              export SEPILOT_SOURCE_DIR="$(pwd)/sepilot"
              uv run --no-sync pyinstaller sepilot_protected.spec --clean --noconfirm

              # Rename inside container (files are owned by root)
              mv dist/sepilot dist/sepilot-linux-amd64-legacy
              mv dist/sepilot-lsp dist/sepilot-lsp-linux-amd64-legacy
            '

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: sepilot-linux-amd64-legacy
          path: |
            dist/sepilot-linux-amd64-legacy
            dist/sepilot-lsp-linux-amd64-legacy

  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            artifact: sepilot-darwin-amd64
            lsp_artifact: sepilot-lsp-darwin-amd64
            ext: ''
          - os: windows-latest
            artifact: sepilot-windows-amd64.exe
            lsp_artifact: sepilot-lsp-windows-amd64.exe
            ext: '.exe'
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      # Windows: use official CPython to avoid python310.dll loading issues
      # from python-build-standalone (used by uv python install)
      - name: Set up Python (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Python (non-Windows)
        if: runner.os != 'Windows'
        run: uv python install 3.10

      - name: Install dependencies
        run: |
          uv sync
          uv pip install pyinstaller

      - name: Download tiktoken data for offline use
        run: uv run python scripts/download_tiktoken_data.py

      - name: Install UPX (macOS)
        if: runner.os == 'macOS'
        run: brew install upx

      - name: Build with PyInstaller
        run: |
          export SEPILOT_SOURCE_DIR="$(pwd)/sepilot"
          uv run pyinstaller sepilot_protected.spec --clean --noconfirm
        shell: bash

      - name: Rename artifacts
        run: |
          mv dist/sepilot${{ matrix.ext }} dist/${{ matrix.artifact }}
          mv dist/sepilot-lsp${{ matrix.ext }} dist/${{ matrix.lsp_artifact }}
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            dist/${{ matrix.artifact }}
            dist/${{ matrix.lsp_artifact }}

  # ---------------------------------------------------------------------------
  # Compatibility test: run built binaries on multiple Linux distros via Docker
  # ---------------------------------------------------------------------------
  compat-test:
    needs: [build-linux, build-linux-legacy]
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          # Legacy binary targets (GLIBC < 2.28)
          - image: centos:7
            distro: CentOS 7
            glibc: "2.17"
            binary: sepilot-linux-amd64-legacy
          - image: ubuntu:18.04
            distro: Ubuntu 18.04
            glibc: "2.27"
            binary: sepilot-linux-amd64-legacy
          # Regular binary targets (GLIBC >= 2.28)
          - image: debian:10
            distro: Debian 10
            glibc: "2.28"
            binary: sepilot-linux-amd64
          - image: ubuntu:20.04
            distro: Ubuntu 20.04
            glibc: "2.31"
            binary: sepilot-linux-amd64
          - image: ubuntu:22.04
            distro: Ubuntu 22.04
            glibc: "2.35"
            binary: sepilot-linux-amd64
          - image: ubuntu:24.04
            distro: Ubuntu 24.04
            glibc: "2.39"
            binary: sepilot-linux-amd64

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.binary }}
          path: bin

      - name: Run --version test
        id: version
        run: |
          chmod +x bin/${{ matrix.binary }}
          VERSION=$(docker run --rm \
            -v "$PWD/bin/${{ matrix.binary }}:/sepilot:ro" \
            ${{ matrix.image }} /sepilot --version 2>&1) || true
          echo "output=$VERSION" >> "$GITHUB_OUTPUT"
          if echo "$VERSION" | grep -q "^SEPilot, version"; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "status=fail" >> "$GITHUB_OUTPUT"
            echo "::error::--version failed on ${{ matrix.distro }}: $VERSION"
          fi

      - name: Run --help test
        id: help
        run: |
          OUTPUT=$(docker run --rm \
            -v "$PWD/bin/${{ matrix.binary }}:/sepilot:ro" \
            ${{ matrix.image }} /sepilot --help 2>&1) || true
          if echo "$OUTPUT" | grep -q "Usage:"; then
            echo "status=pass" >> "$GITHUB_OUTPUT"
          else
            echo "status=fail" >> "$GITHUB_OUTPUT"
            echo "::error::--help failed on ${{ matrix.distro }}"
          fi

      - name: Write result
        run: |
          mkdir -p results
          cat > results/${{ matrix.distro }}.txt <<EOF
          distro=${{ matrix.distro }}
          glibc=${{ matrix.glibc }}
          binary=${{ matrix.binary }}
          version=${{ steps.version.outputs.status }}
          help=${{ steps.help.outputs.status }}
          version_output=${{ steps.version.outputs.output }}
          EOF

      - name: Upload result
        uses: actions/upload-artifact@v4
        with:
          name: compat-result-${{ matrix.distro }}
          path: results/

  # ---------------------------------------------------------------------------
  # Aggregate compatibility results into a markdown table
  # ---------------------------------------------------------------------------
  compat-summary:
    needs: [compat-test]
    runs-on: ubuntu-latest

    outputs:
      table: ${{ steps.summary.outputs.table }}

    steps:
      - name: Download all results
        uses: actions/download-artifact@v4
        with:
          pattern: compat-result-*
          path: results
          merge-multiple: true

      - name: Generate summary table
        id: summary
        run: |
          TABLE="| OS | GLIBC | Binary | --version | --help |"
          TABLE="$TABLE
          |---|---|---|---|---|"

          for f in results/*.txt; do
            eval "$(cat "$f" | sed 's/^ *//')"

            v_icon="✅"; [ "$version" = "pass" ] || v_icon="❌"
            h_icon="✅"; [ "$help" = "pass" ] || h_icon="❌"

            case "$binary" in
              *legacy*) bin_label="legacy" ;;
              *)        bin_label="regular" ;;
            esac

            TABLE="$TABLE
          | $distro | $glibc | $bin_label | $v_icon | $h_icon |"
          done

          {
            echo "table<<EOF"
            echo "$TABLE"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

          # Also write to job summary
          echo "## Linux Compatibility Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "$TABLE" >> "$GITHUB_STEP_SUMMARY"

  # ---------------------------------------------------------------------------
  # Create GitHub Release with compatibility report in release notes
  # ---------------------------------------------------------------------------
  release:
    needs: [build-linux, build-linux-legacy, build, compat-summary]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: sepilot-*
          merge-multiple: true

      - name: Generate release notes from CHANGELOG
        id: notes
        run: |
          TAG="${GITHUB_REF#refs/tags/v}"
          # Extract section for this version from CHANGELOG.md
          NOTES=$(awk "/^## \\[${TAG}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            NOTES="Release ${GITHUB_REF#refs/tags/}"
          fi

          COMPAT_TABLE="${{ needs.compat-summary.outputs.table }}"

          BODY="${NOTES}

          ---

          ### 🐧 Linux Compatibility Test

          ${COMPAT_TABLE}"

          {
            echo "notes<<EOF"
            echo "$BODY"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.notes.outputs.notes }}
          files: |
            artifacts/*
          fail_on_unmatched_files: false
