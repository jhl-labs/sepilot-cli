name: Bug Report
description: 버그를 보고합니다
title: "[Bug] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        버그 리포트를 작성해주셔서 감사합니다. 가능한 한 상세히 작성해주세요.

  - type: textarea
    id: description
    attributes:
      label: 버그 설명
      description: 어떤 문제가 발생했나요?
      placeholder: 명확하고 간결하게 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: 재현 방법
      description: 버그를 재현할 수 있는 단계를 작성해주세요.
      placeholder: |
        1. `sepilot -i` 실행
        2. `/model set ...` 입력
        3. 에러 발생
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 기대 동작
      description: 정상적으로 동작했다면 어떻게 되어야 하나요?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: 에러 로그
      description: 관련 에러 메시지나 로그를 붙여넣어주세요.
      render: shell

  - type: input
    id: version
    attributes:
      label: SEPilot 버전
      description: "`sepilot --help` 출력의 버전 정보"
      placeholder: "0.1.0"
    validations:
      required: true

  - type: input
    id: python
    attributes:
      label: Python 버전
      placeholder: "3.10.12"

  - type: input
    id: os
    attributes:
      label: 운영체제
      placeholder: "Ubuntu 22.04 / macOS 14.0 / Windows 11"
