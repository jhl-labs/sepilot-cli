name: Feature Request
description: 새로운 기능이나 개선사항을 제안합니다
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        기능 제안을 해주셔서 감사합니다!

  - type: textarea
    id: problem
    attributes:
      label: 해결하려는 문제
      description: 이 기능이 필요한 이유를 설명해주세요.
      placeholder: "~할 때 ~가 불편합니다."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 제안하는 해결 방법
      description: 어떤 기능이 추가되면 좋겠는지 설명해주세요.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 대안
      description: 고려해본 다른 방법이 있다면 설명해주세요.

  - type: textarea
    id: context
    attributes:
      label: 추가 정보
      description: 스크린샷, 참고 자료 등 추가 정보가 있다면 첨부해주세요.
